<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Certificate Viewer · NetAcademy</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/portal/css/style.css" />
</head>

<body>

<section class="viewer" id="viewer"></section>

<script src="/portal/js/app.js"></script>

<script>
  const u = buildLayout("certificate-view.html");
  const v = document.getElementById("viewer");

  // ── Marksheet map: email → PDF filename inside /portal/marksheet/ ──
  const MARKSHEET_MAP = {
    "vedant2727swami@gmail.com":      "Vedant Swami Cisco Certified Network Associate.pdf",
    "dhanrajkshirsagar302@gmail.com": "Dhanraj Kshirsagar Cisco Certified Network Associate.pdf",
    "aditya.dabhade@mitaoe.ac.in":    "Aditya Dabhade Cisco Certified Network Associate.pdf"
  };

  const marksheetFile = MARKSHEET_MAP[u.email] || null;
  const marksheetPath = marksheetFile
    ? `/portal/marksheet/${encodeURIComponent(marksheetFile)}`
    : null;

  if(!u.premium){

    v.innerHTML = `
      <div class="locked-overlay glass" style="grid-column:1 / -1">

        <div style="font-size:2.4rem">🔒</div>

        <h2 style="margin-top:.4rem">
          Certificate locked
        </h2>

        <p style="color:var(--text-dim);max-width:560px;margin:.5rem auto 0">
          This certification is available only for enrolled premium learners.
          Complete enrollment to unlock the official CCNA Global Certificate,
          downloadable PDF and verification badge.
        </p>

        <div class="price-tag">
          $${COURSE.price} · One-time enrollment
        </div>

        <a href="/portal/course-details.html" class="btn btn-primary">
          Back to course
        </a>

      </div>
    `;

  } else {

    v.innerHTML = `

      <div class="viewer-stage glass-strong">

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.6rem">

          <div>
            <div style="font-size:.78rem;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase">
              Official document
            </div>

            <div style="font-weight:700;font-size:1.05rem">
              ${COURSE.short}
            </div>
          </div>

          <div class="verify">
            <span class="v-dot"></span>
            Verified · Issued to ${u.name}
          </div>

        </div>

        <div class="viewer-frame" id="frame">

          <iframe
            id="pdfFrame"
            src="${u.certificate}#toolbar=0&navpanes=0"
            title="Certificate"
            onerror="this.style.display='none'">
          </iframe>

        </div>

        <div class="viewer-actions">

          <div id="dlBtnContainer"></div>

          <button
            class="btn btn-ghost"
            id="openCertBtn">
            Open in new tab
          </button>

          <button
            class="btn btn-ghost"
            id="printBtn">
            Print
          </button>

          <button
            class="btn btn-ghost"
            onclick="navigator.clipboard.writeText(window.location.href);toast('Verification link copied','success')">
            Copy verify link
          </button>

        </div>

        ${marksheetPath ? `

        <!-- ── Marksheet Section ── -->
        <div style="margin-top:1.4rem;padding-top:1.2rem;border-top:1px solid var(--border)">

          <div style="font-size:.78rem;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;margin-bottom:.6rem">
            Mark Sheet
          </div>

          <div class="viewer-actions">

            <div id="dlMarksheetContainer"></div>

            <button
              class="btn btn-ghost"
              id="openMarksheetBtn">
              Open Mark Sheet
            </button>

            <button
              class="btn btn-ghost"
              id="printMarksheetBtn">
              Print Mark Sheet
            </button>

          </div>

          <div class="viewer-frame" style="margin-top:1rem">

            <iframe
              id="marksheetPdfFrame"
              src="${marksheetPath}#toolbar=0&navpanes=0"
              title="Mark Sheet"
              onerror="this.style.display='none'">
            </iframe>

          </div>

        </div>

        ` : ""}

      </div>

      <aside class="viewer-side glass-strong">

        <h2 style="font-size:1.05rem;margin-bottom:.4rem">
          Credential details
        </h2>

        <p style="font-size:.85rem;color:var(--text-dim);margin-bottom:1rem">
          This certificate verifies completion of the CCNA Global Certification program.
        </p>

        <dl class="kv">

          <dt>Recipient</dt>
          <dd>${u.name}</dd>

          <dt>Email</dt>
          <dd style="word-break:break-all">${u.email}</dd>

          <dt>Course</dt>
          <dd>${COURSE.title}</dd>

          <!--
          <dt>Academy</dt>
          <dd>${COURSE.academy}</dd>

          <dt>Instructor</dt>
          <dd>${COURSE.instructor}</dd>
          -->

          <dt>Duration</dt>
          <dd>${COURSE.duration}</dd>

          <dt>Hours</dt>
          <dd>${COURSE.hours}</dd>

          <dt>Issued</dt>
          <dd>
            ${new Date().toLocaleDateString(undefined,{
              year:'numeric',
              month:'long',
              day:'numeric'
            })}
          </dd>

        </dl>

        <h3 style="font-size:.92rem;margin-top:1rem">
          Skills validated
        </h3>

        <div class="skill-list">
          ${COURSE.skills.map(s=>`<span>${s}</span>`).join("")}
        </div>

      </aside>

    `;

    // ── Certificate download button (built via DOM to avoid template literal issues) ──
    const dlBtn = document.createElement("a");
    dlBtn.href = u.certificate;
    dlBtn.download = "";
    dlBtn.className = "btn btn-success";
    dlBtn.id = "dlBtn";
    dlBtn.textContent = "Download Certificate (PDF)";
    document.getElementById("dlBtnContainer").appendChild(dlBtn);

    dlBtn.addEventListener("click", () => {
      toast("Downloading your certificate…", "success");
      setTimeout(confetti, 300);
    });

    // ── Certificate open in new tab ──
    document.getElementById("openCertBtn").addEventListener("click", () => {
      window.open(u.certificate, "_blank");
    });

    // ── Certificate print ──
    document.getElementById("printBtn").addEventListener("click", () => {
      const w = window.open(u.certificate, "_blank");
      if(w){ setTimeout(() => w.print(), 800); }
    });

    // ── Marksheet buttons (only if marksheet exists for this user) ──
    if(marksheetPath){

      // Download button built via DOM
      const dlMs = document.createElement("a");
      dlMs.href = marksheetPath;
      dlMs.download = "";
      dlMs.className = "btn btn-success";
      dlMs.id = "dlMarksheet";
      dlMs.textContent = "Download Mark Sheet (PDF)";
      document.getElementById("dlMarksheetContainer").appendChild(dlMs);

      dlMs.addEventListener("click", () => {
        toast("Downloading your mark sheet…", "success");
      });

      // Open marksheet in new tab
      document.getElementById("openMarksheetBtn").addEventListener("click", () => {
        window.open(marksheetPath, "_blank");
      });

      // Print marksheet
      document.getElementById("printMarksheetBtn").addEventListener("click", () => {
        const w = window.open(marksheetPath, "_blank");
        if(w){ setTimeout(() => w.print(), 800); }
      });

    }

    // ── Graceful fallback if certificate PDF missing ──
    setTimeout(() => {
      const f = document.getElementById("pdfFrame");
      try {
        if(
          !f.contentDocument ||
          (f.contentDocument.body && f.contentDocument.body.innerHTML === "")
        ){
          // fallback placeholder
        }
      } catch(e){}
    }, 1500);

  }
</script>

</body>
</html>
