<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Credential Verification · NetAcademy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0a0e1a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .card {
    background: #111827;
    border: 1px solid #1e2d45;
    border-radius: 20px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }

  .cisco-logo {
    display: flex;
    align-items: center;
    gap: .5rem;
    margin-bottom: 1.8rem;
  }

  .cisco-logo img {
    height: 28px;
  }

  .cisco-logo span {
    font-size: .75rem;
    font-weight: 600;
    color: #049fd9;
    letter-spacing: .12em;
    text-transform: uppercase;
  }

  h1 {
    font-size: 1.35rem;
    font-weight: 700;
    margin-bottom: .4rem;
    color: #f1f5f9;
  }

  .subtitle {
    font-size: .85rem;
    color: #64748b;
    margin-bottom: 1.8rem;
    line-height: 1.5;
  }

  label {
    display: block;
    font-size: .78rem;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: .5rem;
  }

  input {
    width: 100%;
    padding: .75rem 1rem;
    background: #0f172a;
    border: 1px solid #1e2d45;
    border-radius: 10px;
    color: #f1f5f9;
    font-size: 1rem;
    font-family: inherit;
    letter-spacing: .06em;
    outline: none;
    transition: border-color .2s;
    margin-bottom: .8rem;
  }

  input:focus {
    border-color: #049fd9;
  }

  button {
    width: 100%;
    padding: .8rem;
    background: #049fd9;
    color: #fff;
    font-size: .95rem;
    font-weight: 700;
    font-family: inherit;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background .2s, transform .1s;
    letter-spacing: .03em;
  }

  button:hover { background: #0284c7; }
  button:active { transform: scale(.98); }

  .error {
    font-size: .82rem;
    color: #f87171;
    min-height: 1.2rem;
    margin-bottom: .6rem;
  }

  .lock-icon {
    font-size: 2.2rem;
    margin-bottom: 1rem;
  }

  /* ── Result section ── */
  .result {
    display: none;
  }

  .result.show {
    display: block;
  }

  .form-section.hide {
    display: none;
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: .5rem;
    background: #052e16;
    border: 1px solid #16a34a;
    border-radius: 10px;
    padding: .7rem 1rem;
    margin-bottom: 1.2rem;
    font-size: .85rem;
    font-weight: 600;
    color: #4ade80;
  }

  .result img {
    width: 100%;
    border-radius: 12px;
    border: 1px solid #1e2d45;
    display: block;
  }

  .back-btn {
    margin-top: 1rem;
    background: #1e2d45;
    color: #94a3b8;
    font-weight: 600;
  }

  .back-btn:hover { background: #263650; }

  .powered {
    text-align: center;
    font-size: .72rem;
    color: #334155;
    margin-top: 1.5rem;
  }
</style>
</head>
<body>

<div class="card">

  <div class="cisco-logo">
    <svg width="60" height="28" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="20" width="20" height="40" rx="4" fill="#049fd9"/>
      <rect x="30" y="8" width="20" height="64" rx="4" fill="#049fd9"/>
      <rect x="60" y="0" width="20" height="80" rx="4" fill="#049fd9"/>
      <rect x="90" y="8" width="20" height="64" rx="4" fill="#049fd9"/>
      <rect x="120" y="20" width="20" height="40" rx="4" fill="#049fd9"/>
    </svg>
    <span>Credential Verification</span>
  </div>

  <!-- Form Section -->
  <div class="form-section" id="formSection">

    <div class="lock-icon">🔐</div>

    <h1>Verify Credential</h1>
    <p class="subtitle">
      Enter the Cisco ID No. printed on your certificate to view your verified credential details.
    </p>

    <label for="ciscoInput">Cisco ID No.</label>
    <input
      type="text"
      id="ciscoInput"
      placeholder="e.g. CSCO12652318"
      autocomplete="off"
      spellcheck="false"
      maxlength="20"
    />

    <div class="error" id="errorMsg"></div>

    <button id="verifyBtn">Verify Credential</button>

  </div>

  <!-- Result Section -->
  <div class="result" id="resultSection">

    <div class="result-header">
      <span>✅</span>
      Credential verified successfully
    </div>

    <img id="resultImg" src="" alt="Verified Credential" />

    <button class="back-btn" id="backBtn">← Verify a different credential</button>

  </div>

  <div class="powered">Powered by NetAcademy · CCNA Global Portal</div>

</div>

<script>
  // ── Cisco ID → image map ──
  const CREDENTIALS = {
    "CSCO12652318": "/portal/verify/dhanraj-verify.jpg",
    "CSCO37506420": "/portal/verify/aditya-verify.jpg",
    "CSCO72276575": "/portal/verify/vedant-verify.jpg"
  };

  const input      = document.getElementById("ciscoInput");
  const verifyBtn  = document.getElementById("verifyBtn");
  const errorMsg   = document.getElementById("errorMsg");
  const formSec    = document.getElementById("formSection");
  const resultSec  = document.getElementById("resultSection");
  const resultImg  = document.getElementById("resultImg");
  const backBtn    = document.getElementById("backBtn");

  function verify() {
    const val = input.value.trim().toUpperCase();
    if(!val){
      errorMsg.textContent = "Please enter your Cisco ID No.";
      return;
    }
    if(CREDENTIALS[val]){
      errorMsg.textContent = "";
      resultImg.src = CREDENTIALS[val];
      formSec.classList.add("hide");
      resultSec.classList.add("show");
    } else {
      errorMsg.textContent = "Invalid Cisco ID. Please check your certificate and try again.";
      input.style.borderColor = "#f87171";
      setTimeout(() => input.style.borderColor = "", 1500);
    }
  }

  verifyBtn.addEventListener("click", verify);
  input.addEventListener("keydown", e => { if(e.key === "Enter") verify(); });

  backBtn.addEventListener("click", () => {
    input.value = "";
    errorMsg.textContent = "";
    resultImg.src = "";
    formSec.classList.remove("hide");
    resultSec.classList.remove("show");
  });
</script>

</body>
</html>
